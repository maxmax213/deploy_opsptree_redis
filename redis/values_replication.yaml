---
redisReplication:
  name: redis-replication
  clusterSize: 3
  image: quay.io/opstree/redis
  tag: v7.0.15
  imagePullPolicy: IfNotPresent
  # imagePullSecrets: []
  #   - name: registry-credentials
  redisSecret:
    secretName: ""
    secretKey: ""
  serviceType: ClusterIP
  resources: {}
