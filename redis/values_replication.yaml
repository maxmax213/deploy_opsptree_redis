  # minReadySeconds: 0
  # recreateStatefulSetOnUpdateInvalid: false
  # maxMemoryPercentOfLimit: 0
  # dynamicConfig: []
  #   - maxmemory-policy allkeys-lru
  # persistentVolumeClaimRetentionPolicy: {}
  #   whenDeleted: Delete
  #   whenScaled: Retain
  # livenessProbe: {}
  # readinessProbe: {}

# name: ""

# labels: {}
#   environment: test

# annotations: {}
#   annotation-key: annotation-value

externalConfig:
  enabled: false
  # data: |
  #   tcp-keepalive 400
  #   slowlog-max-len 158
  #   stream-node-max-bytes 2048

externalService:
  enabled: false
  # annotations: {}
  # serviceType: NodePort
  # port: 6379
  # nodePort: 31000

serviceMonitor:
  enabled: false
  # interval: 30s
  # scrapeTimeout: 10s
  # namespace: ""
  # extraLabels: {}

redisExporter:
  enabled: false
  # image: quay.io/opstree/redis-exporter
  # tag: v1.44.0
  # imagePullPolicy: IfNotPresent
  # resources: {}
  # env: []
  # securityContext: {}

# initContainer:
#   enabled: false
#   image: ""
#   imagePullPolicy: IfNotPresent
#   resources: {}
#   env: []
#   command: []
#   args: []

# sidecars: []

# priorityClassName: ""

# nodeSelector: {}

storageSpec:
  volumeClaimTemplate:
    spec:
      # storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
  # selector: {}

podSecurityContext:
  runAsUser: 1000
  fsGroup: 1000

# securityContext: {}

# affinity: {}

# tolerations: []

# topologySpreadConstraints: []

# serviceAccountName: ""

# TLS:
#   ca: ca.crt
#   cert: tls.crt
#   key: tls.key
#   secret:
#     secretName: ""

# acl:
#   secret:
#     secretName: ""
#   persistentVolumeClaim: ""

# env: []

pdb:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: null

podManagementPolicy: OrderedReady

# Sentinel управляется тем же RedisReplication CR. Отдельный RedisSentinel CR
# и отдельный chart redis-sentinel не используются.
sentinel:
  enabled: true
  image: quay.io/opstree/redis-sentinel
  tag: v7.0.15
  imagePullPolicy: IfNotPresent
  size: 3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  redisSecret:
    secretName: ""
    secretKey: ""
  # ignoreAnnotations: []
  # minReadySeconds: 0
  # persistentVolumeClaimRetentionPolicy: {}
  parallelSyncs: "1"
  failoverTimeout: "180000"
  downAfterMilliseconds: "30000"
  resolveHostnames: "no"
  announceHostnames: "no"
  # additionalSentinelConfig: ""
  # affinity: {}
  # tolerations: []
  # nodeSelector: {}
  # topologySpreadConstraints: []
  podSecurityContext:
    runAsUser: 1000
    fsGroup: 1000
  # securityContext: {}
  # priorityClassName: ""
  # terminationGracePeriodSeconds: null
  # serviceAccountName: ""
