---
redisStandalone:
  name: redis
  image: quay.io/opstree/redis
  tag: v7.0.15
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
    # - name: Секрет с учётными данными реестра
  redisSecret:
    secretName: ""
    secretKey: ""
  serviceType: ClusterIP
  resources: {}
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
  ignoreAnnotations: []
    # - "redis.opstreelabs.in/ignore"
  minReadySeconds: 0
  # -- Некоторые поля StatefulSet неизменяемы, например volumeClaimTemplates.
  # Если установлено true, оператор удалит StatefulSet и создаст его заново. Значение по умолчанию: false.
  recreateStatefulSetOnUpdateInvalid: false
  # -- Доля лимита памяти контейнера Redis в процентах, используемая как maxmemory.
  #    Значение по умолчанию: 0 (отключено).
  maxMemoryPercentOfLimit: 0
  persistentVolumeClaimRetentionPolicy: {}
    # whenDeleted: Delete
    # whenScaled: Retain

labels: {}
#   foo: bar
#   test: echo

externalConfig:
  enabled: true
  data: |
    tcp-keepalive 400

externalService:
  enabled: false
  # annotations:
  #   foo: bar
  serviceType: NodePort
  port: 6379
  #nodePort: 31000

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  # -- Namespace для создания ServiceMonitor. Если не указан, используется namespace Redis.
  namespace: ""
  # -- Дополнительные метки для ServiceMonitor, когда он включён.
  extraLabels: {}
    # foo: bar
    # team: devops

redisExporter:
  enabled: false
  image: quay.io/opstree/redis-exporter
  tag: "v1.44.0"
  imagePullPolicy: IfNotPresent
  resources: {}
    # requests:
    #   cpu: 100m
    #   memory: 128Mi
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
  env: []
    # - name: VAR_NAME
    #   value: "value1"
  securityContext: {}

initContainer:
  enabled: false
  image: ""
  imagePullPolicy: "IfNotPresent"
  resources: {}
    # requests:
    #   memory: "64Mi"
    #   cpu: "250m"
    # limits:
    #   memory: "128Mi"
    #   cpu: "500m"
  env: []
  command: []
  args: []

sidecars: []
  # - name: "sidecar-example"
  #   image: "busybox:latest"
  #   imagePullPolicy: "IfNotPresent"
  #   resources:
  #     limits:
  #       cpu: "100m"
  #       memory: "128Mi"
  #     requests:
  #       cpu: "50m"
  #       memory: "64Mi"
  #   env: []
  #   # - name: MY_ENV_VAR
  #   #   value: "my-env-var-value"
  #   command: []
  #   # - "/bin/sh"
  #   # - "-c"
  #   # - "sleep 3600"

priorityClassName: ""

nodeSelector: {}
  # memory: medium

storageSpec:
  volumeClaimTemplate:
    spec:
      # storageClassName: standard
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
  #   selector: {}

podSecurityContext:
  runAsUser: 1000
  fsGroup: 1000

securityContext: {}

affinity: {}
  # nodeAffinity:
  #   requiredDuringSchedulingIgnoredDuringExecution:
  #     nodeSelectorTerms:
  #     - matchExpressions:
  #       - key: disktype
  #         operator: In
  #         values:
  #         - ssd

tolerations: [] 
  # - key: "key"
  #   operator: "Equal"
  #   value: "value"
  #   effect: "NoSchedule"

topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app: redis

serviceAccountName: ""

TLS:
  ca: ca.crt
  cert: tls.crt
  key: tls.key
  secret:
    secretName: ""

acl:
  # Настройка ACL из Kubernetes Secret
  secret:
    secretName: ""
  # Настройка ACL из PersistentVolumeClaim
  # В корне PVC должен находиться файл с именем "user.acl"
  # persistentVolumeClaim: "redis-acl-pvc"

env: []
  # - name: VAR_NAME
  #   value: "value1"
